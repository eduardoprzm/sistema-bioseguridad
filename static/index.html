<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Acceso - Bioseguridad Invermar</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400 tracking-wide uppercase">Control de Bioseguridad</h1>
            <p class="text-gray-400 text-sm mt-1">Registro obligatorio de ingreso a instalaciones</p>
        </div>

        <form id="formBioseguridad" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Piscicultura / Unidad Destino</label>
                <input type="text" id="centro" name="centro" readonly 
                    class="w-full bg-gray-950 border border-gray-700 text-blue-300 px-4 py-3 rounded-xl font-bold focus:outline-none cursor-not-allowed">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nombre Completo</label>
                    <input type="text" id="nombre_completo" name="nombre_completo" required 
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Tipo Identificación</label>
                    <select id="tipo_identificacion" name="tipo_identificacion" required 
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                        <option value="RUT">RUT</option>
                        <option value="Pasaporte">Pasaporte</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">RUT / Documento</label>
                    <input type="text" id="rut" name="rut" required 
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Empresa a la que pertenece</label>
                <select id="empresa" name="empresa" required onchange="manejarFlujoEmpresa()"
                    class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none font-medium">
                    <option value="Invermar">Invermar</option>
                    <option value="Externa">Empresa Contratista / Externa</option>
                </select>
            </div>

            <div id="bloque_ultimo_ingreso" class="bg-gray-900/50 p-4 rounded-xl border border-gray-700 space-y-4">
                
                <div id="wrapper_centro_externo" class="hidden">
                    <label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2">Nombre de Piscicultura / Centro Mar Externo</label>
                    <input type="text" id="centro_procedencia" name="centro_procedencia" 
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                </div>

                <div>
                    <label id="label_fecha" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                        Último ingreso a centro de mar Invermar
                    </label>
                    
                    <div id="wrapper_no_aplica" class="flex items-center mb-3">
                        <input type='checkbox' id='no_aplica_fecha' onchange='manejarCheckboxFecha()' class='w-4 h-4 bg-gray-700 border-gray-600 rounded text-blue-500'>
                        <label for='no_aplica_fecha' class='ml-2 text-sm text-gray-300 cursor-pointer select-none'>No recuerdo / No aplica (Sin visitas recientes)</label>
                    </div>

                    <input type="date" id="ultimo_ingreso_fecha" name="ultimo_ingreso_fecha" required
                        class="w-full bg-gray-700 border border-gray-600 px-4 py-2.5 rounded-xl text-white focus:border-blue-500 focus:outline-none">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl transition duration-150 tracking-wide uppercase text-sm mt-4 shadow-lg">
                Enviar Declaración Sanitaria
            </button>
        </form>
    </div>

    <script>
        // URL de tu API en Render (Asegúrate de que termine sin la barra '/')
        const API_URL = "https://sistema-bioseguridad.onrender.com";

        // 🔎 DETECCIÓN AUTOMÁTICA DEL QR DESDE LA URL (?centro=Aucha)
        window.addEventListener('DOMContentLoaded', () => {
            const parametros = new URLSearchParams(window.location.search);
            const centroDetectado = parametros.get('centro');
            
            if (centroDetectado) {
                document.getElementById('centro').value = centroDetectado;
            } else {
                document.getElementById('centro').value = "Centro No Identificado";
                Swal.fire({
                    icon: 'warning',
                    title: 'QR Inválido o Sin Parámetro',
                    text: 'Por favor, escanee un código QR autorizado de la instalación.',
                    confirmButtonColor: '#3b82f6',
                    background: '#1f2937',
                    color: '#fff'
                });
            }
            manejarFlujoEmpresa();
        });

        // 🏭 LÓGICA CONDICIONAL POR EMPRESA (Nota técnica sección 4)
        function manejarFlujoEmpresa() {
            const empresaSeleccionada = document.getElementById('empresa').value;
            const wrapperCentroExterno = document.getElementById('wrapper_centro_externo');
            const centroProcedenciaInput = document.getElementById('centro_procedencia');
            const wrapperNoAplica = document.getElementById('wrapper_no_aplica');
            const labelFecha = document.getElementById('label_fecha');
            const fechaInput = document.getElementById('ultimo_ingreso_fecha');
            const checkboxNoAplica = document.getElementById('no_aplica_fecha');

            if (empresaSeleccionada === "Invermar") {
                // Caso Invermar
                labelFecha.innerText = "Último ingreso a centro de mar Invermar";
                wrapperCentroExterno.classList.add('hidden');
                centroProcedenciaInput.required = false;
                centroProcedenciaInput.value = "";
                wrapperNoAplica.classList.remove('hidden');
            } else {
                // Caso Empresa Externa
                labelFecha.innerText = "Ingreso a centro de mar o piscicultura externa";
                wrapperCentroExterno.classList.remove('hidden');
                centroProcedenciaInput.required = true;
                wrapperNoAplica.classList.add('hidden');
                
                // Forzar ingreso de fecha
                checkboxNoAplica.checked = false;
                fechaInput.disabled = false;
                fechaInput.required = true;
            }
        }

        // Manejar opción de "No recuerdo / No aplica"
        function manejarCheckboxFecha() {
            const checkbox = document.getElementById('no_aplica_fecha');
            const fechaInput = document.getElementById('ultimo_ingreso_fecha');
            
            if (checkbox.checked) {
                fechaInput.value = "";
                fechaInput.disabled = true;
                fechaInput.required = false;
            } else {
                fechaInput.disabled = false;
                fechaInput.required = true;
            }
        }

        // 🚀 ENVÍO E INTERPRETACIÓN DE LA DECISIÓN DEL BACKEND
        document.getElementById('formBioseguridad').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                centro: document.getElementById('centro').value,
                nombre_completo: document.getElementById('nombre_completo').value,
                tipo_identificacion: document.getElementById('tipo_identificacion').value,
                rut: document.getElementById('rut').value,
                email: document.getElementById('email').value,
                empresa: document.getElementById('empresa').value,
                ultimo_ingreso_fecha: document.getElementById('no_aplica_fecha')?.checked ? null : document.getElementById('ultimo_ingreso_fecha').value,
                centro_procedencia: document.getElementById('centro_procedencia').value || null
            };

            // Loader de carga
            Swal.fire({
                title: 'Evaluando Condición Sanitaria...',
                text: 'Espere un momento por favor.',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
                background: '#1f2937',
                color: '#fff'
            });

            try {
                const response = await fetch(`${API_URL}/api/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    // 🟢 CASO: ACCESO AUTORIZADO (Nota técnica sección 5)
                    Swal.fire({
                        icon: 'success',
                        title: '<span class="text-green-400">ACCESO AUTORIZADO</span>',
                        html: `<p class="text-gray-300 text-left text-sm font-medium">${data.message}</p><br><p class="text-gray-400 text-xs text-center">Favor esperar.</p>`,
                        confirmButtonColor: '#10b981',
                        background: '#1f2937',
                        color: '#fff'
                    }).then(() => document.getElementById('formBioseguridad').reset());
                } else if (response.status === 403) {
                    // 🔴 CASO: ACCESO RESTRINGIDO (Nota técnica sección 5 y 7)
                    Swal.fire({
                        icon: 'error',
                        title: '<span class="text-red-500">ACCESO RESTRINGIDO</span>',
                        html: `<p class="text-gray-300 text-left text-sm font-medium">${data.detail}</p>`,
                        confirmButtonColor: '#ef4444',
                        background: '#1f2937',
                        color: '#fff'
                    });
                } else {
                    // Errores de validación menores (400)
                    Swal.fire({
                        icon: 'warning',
                        title: 'Validación de Formulario',
                        text: data.detail || 'Ocurrió un error inesperado.',
                        confirmButtonColor: '#f59e0b',
                        background: '#1f2937',
                        color: '#fff'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de Red',
                    text: 'No se pudo conectar con el servidor central de bioseguridad.',
                    confirmButtonColor: '#ef4444',
                    background: '#1f2937',
                    color: '#fff'
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Acceso - Bioseguridad Invermar</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html, body {
            overflow-x: hidden !important;
            width: 100% !important;
            position: relative;
        }
        body.swal2-shown {
            overflow-x: hidden !important;
            padding-right: 0 !important;
        }

        /* Fondo con patrón de la empresa, en mosaico */
        body {
            background-image: url('/static/fondo.jpg');
            background-repeat: repeat;
            background-size: 480px auto;
            background-color: #f0f4f8;
        }

        /* --- FIX: input type="date" desbordándose en iOS/Safari --- */
        input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            margin-left: 4px;
        }
    </style>
</head>
<body class="text-blue-950 min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <div class="bg-white p-5 sm:p-8 rounded-2xl shadow-xl w-full max-w-md mx-auto border border-blue-100 overflow-hidden box-border">

        <div id="vista-formulario" class="w-full overflow-hidden">
            <div class="text-center mb-8">
                <img src="/static/logo.png" alt="Invermar" class="h-8 mx-auto mb-4">
                <h1 class="text-2xl font-bold text-blue-600 tracking-wide uppercase">Control de Bioseguridad</h1>
                <p class="text-blue-500 text-sm mt-1 font-medium">Registro obligatorio de ingreso a instalaciones</p>
            </div>

            <form id="formBioseguridad" class="space-y-5 w-full overflow-hidden">
                <div>
                    <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">Piscicultura / Unidad Destino</label>
                    <input type="text" id="centro" name="centro" readonly 
                        class="w-full bg-blue-50 border border-blue-100 text-blue-600 px-4 py-3 rounded-xl font-bold focus:outline-none cursor-not-allowed box-border">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">Nombre Completo</label>
                        <input type="text" id="nombre_completo" name="nombre_completo" required 
                            class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none box-border">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">Tipo Identificación</label>
                        <select id="tipo_identificacion" name="tipo_identificacion" required 
                            class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:outline-none box-border">
                            <option value="RUT">RUT</option>
                            <option value="Pasaporte">Pasaporte</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">RUT / Documento</label>
                        <input type="text" id="rut" name="rut" required 
                            class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none box-border">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">Correo Electrónico</label>
                        <input type="email" id="email" name="email" required 
                            class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none box-border">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">Empresa a la que pertenece</label>
                    <select id="empresa" name="empresa" required onchange="manejarFlujoEmpresa()"
                        class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:outline-none font-medium box-border">
                        <option value="Invermar">Invermar</option>
                        <option value="Externa">Empresa Contratista / Externa</option>
                    </select>
                </div>

                <div id="bloque_ultimo_ingreso" class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 space-y-4 w-full max-w-full overflow-hidden box-border">
                    <div id="wrapper_centro_externo" class="hidden w-full">
                        <label class="block text-xs font-semibold text-amber-600 uppercase tracking-wider mb-2">Nombre de Piscicultura / Centro Mar Externo</label>
                        <input type="text" id="centro_procedencia" name="centro_procedencia" 
                            class="w-full bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:outline-none box-border">
                    </div>

                    <div class="w-full min-w-0">
                        <label id="label_fecha" class="block text-xs font-semibold text-blue-800 uppercase tracking-wider mb-2">
                            Último ingreso a centro de mar Invermar
                        </label>
                        <div id="wrapper_no_aplica" class="flex items-center mb-3">
                            <input type='checkbox' id='no_aplica_fecha' onchange='manejarCheckboxFecha()' class='w-4 h-4 bg-white border-blue-300 rounded text-blue-600 focus:ring-blue-500'>
                            <label for='no_aplica_fecha' class='ml-2 text-sm text-blue-700 cursor-pointer select-none font-medium'>No recuerdo / No aplica (Sin visitas recientes)</label>
                        </div>
                        <input type="date" id="ultimo_ingreso_fecha" name="ultimo_ingreso_fecha" required
                            class="w-full min-w-0 bg-white border border-blue-200 px-4 py-2.5 rounded-xl text-blue-950 focus:border-blue-500 focus:outline-none box-border">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 px-4 rounded-xl transition duration-150 tracking-wide uppercase text-sm mt-4 shadow-md box-border">
                    Enviar Declaración Sanitaria
                </button>
            </form>
        </div>

        <div id="vista-final" class="hidden text-center py-6 space-y-6 w-full overflow-hidden">
            <div id="icono-resultado" class="flex justify-center"></div>
            <div>
                <h2 id="titulo-resultado" class="text-2xl font-bold tracking-wide uppercase"></h2>
                <p id="subtitulo-centro" class="text-blue-600 font-semibold mt-1 text-sm uppercase"></p>
            </div>
            <div class="bg-blue-50/50 p-5 rounded-xl border border-blue-100 text-left box-border">
                <p id="mensaje-resultado" class="text-blue-900 text-sm leading-relaxed font-medium break-words"></p>
            </div>
            <p class="text-xs text-blue-400 italic font-medium">Esta ventana no permite nuevos ingresos de datos.</p>
        </div>

    </div>

    <script>
        const API_URL = "https://sistema-bioseguridad.onrender.com";

        window.addEventListener('DOMContentLoaded', () => {
            const parametros = new URLSearchParams(window.location.search);
            const centroDetectado = parametros.get('centro');

            if (centroDetectado) {
                document.getElementById('centro').value = centroDetectado;
            } else {
                document.getElementById('centro').value = "Centro No Identificado";
                Swal.fire({
                    icon: 'warning',
                    title: 'QR Inválido',
                    text: 'Por favor, escanee un código QR autorizado.',
                    confirmButtonColor: '#2563eb',
                    background: '#fff',
                    color: '#1e293b'
                });
            }
            manejarFlujoEmpresa();
        });

        function manejarFlujoEmpresa() {
            const empresaSeleccionada = document.getElementById('empresa').value;
            const wrapperCentroExterno = document.getElementById('wrapper_centro_externo');
            const centroProcedenciaInput = document.getElementById('centro_procedencia');
            const wrapperNoAplica = document.getElementById('wrapper_no_aplica');
            const labelFecha = document.getElementById('label_fecha');
            const fechaInput = document.getElementById('ultimo_ingreso_fecha');
            const checkboxNoAplica = document.getElementById('no_aplica_fecha');

            if (empresaSeleccionada === "Invermar") {
                labelFecha.innerText = "Último ingreso a centro de mar Invermar";
                wrapperCentroExterno.classList.add('hidden');
                centroProcedenciaInput.required = false;
                centroProcedenciaInput.value = "";
                wrapperNoAplica.classList.remove('hidden');
            } else {
                labelFecha.innerText = "Ingreso a centro de mar o piscicultura externa";
                wrapperCentroExterno.classList.remove('hidden');
                centroProcedenciaInput.required = true;
                wrapperNoAplica.classList.add('hidden');
                checkboxNoAplica.checked = false;
                fechaInput.disabled = false;
                fechaInput.required = true;
            }
        }

        function manejarCheckboxFecha() {
            const checkbox = document.getElementById('no_aplica_fecha');
            const fechaInput = document.getElementById('ultimo_ingreso_fecha');

            if (checkbox.checked) {
                fechaInput.value = "";
                fechaInput.disabled = true;
                fechaInput.required = false;
            } else {
                fechaInput.disabled = false;
                fechaInput.required = true;
            }
        }

        function mostrarPantallaFinal(estado, titulo, mensaje) {
            // estado: 'autorizado' | 'restringido' | 'pendiente'
            const centroActual = document.getElementById('centro').value;

            document.getElementById('vista-formulario').classList.add('hidden');
            const vistaFinal = document.getElementById('vista-final');
            vistaFinal.classList.remove('hidden');

            document.getElementById('titulo-resultado').innerHTML = titulo;
            document.getElementById('subtitulo-centro').innerText = `Instalación: ${centroActual}`;
            document.getElementById('mensaje-resultado').innerText = mensaje;

            const iconoContenedor = document.getElementById('icono-resultado');

            if (estado === 'autorizado') {
                document.getElementById('titulo-resultado').className = "text-2xl font-bold tracking-wide uppercase text-green-600";
                iconoContenedor.innerHTML = `
                    <div class="bg-green-50 p-4 rounded-full border border-green-200">
                        <svg class="w-16 h-16 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    </div>`;
            } else if (estado === 'pendiente') {
                document.getElementById('titulo-resultado').className = "text-2xl font-bold tracking-wide uppercase text-amber-500";
                iconoContenedor.innerHTML = `
                    <div class="bg-amber-50 p-4 rounded-full border border-amber-200">
                        <svg class="w-16 h-16 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>`;
            } else {
                document.getElementById('titulo-resultado').className = "text-2xl font-bold tracking-wide uppercase text-red-600";
                iconoContenedor.innerHTML = `
                    <div class="bg-red-50 p-4 rounded-full border border-red-200">
                        <svg class="w-16 h-16 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </div>`;
            }
        }

        document.getElementById('formBioseguridad').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                centro: document.getElementById('centro').value,
                nombre_completo: document.getElementById('nombre_completo').value,
                tipo_identificacion: document.getElementById('tipo_identificacion').value,
                rut: document.getElementById('rut').value,
                email: document.getElementById('email').value,
                empresa: document.getElementById('empresa').value,
                ultimo_ingreso_fecha: document.getElementById('no_aplica_fecha')?.checked ? null : document.getElementById('ultimo_ingreso_fecha').value,
                centro_procedencia: document.getElementById('centro_procedencia').value || null
            };

            Swal.fire({
                title: 'Evaluando Condición Sanitaria...',
                text: 'Espere un momento por favor.',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading(),
                background: '#fff',
                color: '#1e293b'
            });

            try {
                const response = await fetch(`${API_URL}/api/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.status === 202) {
                    mostrarPantallaFinal('pendiente', "Autorización Pendiente", data.message);

                    Swal.fire({
                        icon: 'info',
                        title: '<span style="color:#f59e0b;">AUTORIZACIÓN PENDIENTE</span>',
                        html: `<p class="text-blue-900 text-sm">${data.message}</p>`,
                        confirmButtonColor: '#f59e0b',
                        background: '#fff',
                        color: '#1e293b'
                    });
                } else if (response.ok) {
                    mostrarPantallaFinal('autorizado', "Acceso Autorizado", data.message);

                    Swal.fire({
                        icon: 'success',
                        title: '<span class="text-green-600">ACCESO AUTORIZADO</span>',
                        html: `<p class="text-blue-900 text-sm">${data.message}</p>`,
                        confirmButtonColor: '#2563eb',
                        background: '#fff',
                        color: '#1e293b'
                    });
                } else if (response.status === 403) {
                    mostrarPantallaFinal('restringido', "Acceso Restringido", data.detail);

                    Swal.fire({
                        icon: 'error',
                        title: '<span class="text-red-600">ACCESO RESTRINGIDO</span>',
                        html: `<p class="text-blue-900 text-sm">${data.detail}</p>`,
                        confirmButtonColor: '#ef4444',
                        background: '#fff',
                        color: '#1e293b'
                    });
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Validación de Formulario',
                        text: data.detail || 'Ocurrió un error inesperado.',
                        confirmButtonColor: '#f59e0b',
                        background: '#fff',
                        color: '#1e293b'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de Red',
                    text: 'No se pudo conectar con el servidor central de bioseguridad.',
                    confirmButtonColor: '#ef4444',
                    background: '#fff',
                    color: '#1e293b'
                });
            }
        });
    </script>
</body>
</html>
